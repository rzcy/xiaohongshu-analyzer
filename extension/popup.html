<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 420px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff; }
    .header { background: linear-gradient(135deg, #ff4757, #ff6b81); color: #fff; padding: 16px; text-align: center; }
    .header h1 { font-size: 16px; margin-bottom: 4px; }
    .header p { font-size: 12px; opacity: 0.9; }
    .content { padding: 16px; }
    .status { padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
    .status.info { background: #f0f7ff; color: #1a73e8; }
    .status.success { background: #e8f5e9; color: #2e7d32; }
    .status.error { background: #ffeef0; color: #d32f2f; }
    .note-card { background: #f8f9fa; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .note-card h3 { font-size: 14px; margin-bottom: 8px; color: #333; }
    .note-card .meta { display: flex; gap: 12px; font-size: 12px; color: #666; }
    .note-card .meta span { display: flex; align-items: center; gap: 4px; }
    .score-section { text-align: center; padding: 12px; background: #fff8f0; border-radius: 8px; margin-bottom: 12px; }
    .score-section .score { font-size: 32px; font-weight: bold; color: #ff4757; }
    .score-section .level { font-size: 14px; color: #666; margin-top: 4px; }
    .settings { margin-bottom: 12px; }
    .settings label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
    .settings input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #ff4757; color: #fff; }
    .btn-primary:hover { background: #ff3344; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .analysis { margin-top: 12px; font-size: 13px; line-height: 1.6; color: #333; max-height: 400px; overflow-y: auto; }
    .analysis h2 { font-size: 14px; color: #ff4757; margin: 12px 0 6px; }
    .analysis ul { padding-left: 16px; }
    .hidden { display: none; }
    .loading { text-align: center; padding: 20px; }
    .loading .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #f3f3f3; border-top: 3px solid #ff4757; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔥 小红书爆款拆解器</h1>
    <p>在笔记页面点击即可一键分析</p>
  </div>
  
  <div class="content">
    <!-- API 设置 -->
    <div class="settings" id="settingsSection">
      <label>DeepSeek API Key（首次需填写，之后自动记住）</label>
      <input type="password" id="apiKey" placeholder="sk-xxxxxxxxxxxx">
    </div>

    <!-- 状态提示 -->
    <div class="status info" id="statusBox">
      请在小红书笔记页面打开此插件
    </div>

    <!-- 笔记信息卡片 -->
    <div class="note-card hidden" id="noteCard">
      <h3 id="noteTitle"></h3>
      <div class="meta">
        <span>👍 <b id="noteLikes">0</b></span>
        <span>⭐ <b id="noteCollects">0</b></span>
        <span>💬 <b id="noteComments">0</b></span>
        <span>✍️ <b id="noteAuthor"></b></span>
      </div>
    </div>

    <!-- 爆款指数 -->
    <div class="score-section hidden" id="scoreSection">
      <div class="score" id="scoreValue">0</div>
      <div class="level" id="scoreLevel">计算中...</div>
    </div>

    <!-- 操作按钮 -->
    <button class="btn btn-primary" id="analyzeBtn">🚀 提取并拆解</button>

    <!-- 加载状态 -->
    <div class="loading hidden" id="loadingSection">
      <div class="spinner"></div>
      <p style="margin-top:8px;font-size:13px;color:#666;">AI 正在分析中...</p>
    </div>

    <!-- 分析结果 -->
    <div class="analysis hidden" id="analysisResult"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
